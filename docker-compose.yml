services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend-generator:
    build:
      context: ./backend-generator
      dockerfile: Dockerfile
    environment:
      STORY_STORAGE: s3
      STORY_BUCKET: ${STORY_BUCKET}
      AWS_REGION: ${AWS_REGION}
      APP_ENV: prod
    ports:
      - "3000:3000"

  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    environment:
      EXTERNAL_CHARACTER_API_URL: ${EXTERNAL_CHARACTER_API_URL}
      STORY_STORAGE: s3
      STORY_BUCKET: ${STORY_BUCKET}
      AWS_REGION: ${AWS_REGION}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      COGNITO_CLIENT_SECRET: ${COGNITO_CLIENT_SECRET}
      APP_ENV: prod
      GENERATOR_URL: http://backend-generator:3000
    depends_on:
      db:
        condition: service_healthy
      # backend-generator:
      #   condition: service_started
    ports:
      - "8000:8000"
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - backend-api


volumes:
  pgdata:
