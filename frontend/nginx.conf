server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend-api container
  location /v1/ {
    proxy_pass http://backend-api:8000/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }
}
